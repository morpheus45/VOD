<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lecteur PIPSIFLIX</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <link rel="stylesheet" href="player.css" />
  
  <!-- 
    CORRECTION : Chargement des bibliothèques HLS et MPEG-TS avec fallback local
    Les scripts sont chargés avec async et onerror pour éviter les blocages
  -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" async onerror="console.warn('HLS.js CDN indisponible, fallback local activé')"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@latest" async onerror="console.warn('MPEG-TS.js CDN indisponible, fallback local activé')"></script>
</head>
<body>
  <div class="player-shell">
    <div class="player-top">
      <button id="backBtn" class="icon-btn" type="button">Retour</button>
      <div class="player-title-wrap">
        <div id="playerTitle" class="player-title">Lecture</div>
        <div id="playerMeta" class="player-meta"></div>
      </div>
      <button id="favBtn" class="icon-btn" type="button">Favori</button>
    </div>

    <div class="video-wrap">
      <video id="video" playsinline controls autoplay preload="metadata"></video>
      <div id="overlay" class="overlay">
        <button id="playOverlayBtn" class="play-overlay" type="button">Lire</button>
      </div>
      <div id="playbackStatus" class="playback-status" hidden></div>
    </div>

    <div class="player-actions">
      <button id="nativePlayBtn" type="button" style="background: linear-gradient(135deg, #ff3d5e, #ff9f2c); font-weight: bold; padding: 12px 16px; border-radius: 8px; border: none; color: white; cursor: pointer; font-size: 14px;">Lecture Native</button>
      <button id="fullscreenBtn" type="button">Plein écran</button>
      <button id="copyBtn" type="button">Copier le lien</button>
      <button id="externalBtn" type="button">Lien direct</button>
      <button id="vlcBtn" type="button">VLC</button>
    </div>

    <div class="player-panel">
      <h2>Informations</h2>
      <p id="plotText">Aucune description.</p>
    </div>
  </div>

  <script src="player.js"></script>
</body>
</html>
