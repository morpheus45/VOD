<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accès admin</title>
  <meta name="theme-color" content="#1d4ed8" />
  <link rel="icon" href="./icon-192.png" />
  <style>
    :root{--panel:#121a2b;--panel2:#1a2440;--text:#eef3ff;--muted:#9fb0d0;--accent:#5ea1ff;--border:#2b395f;--bad:#ff6b6b;}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#0a1020,#10172a);color:var(--text)}
    .card{width:min(460px,92vw);background:rgba(18,26,43,.96);border:1px solid var(--border);border-radius:20px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0 0 14px;color:var(--muted)}
    input,button{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:15px}
    button{cursor:pointer;background:var(--accent);color:#08101f;font-weight:700;margin-top:10px}
    .msg{margin-top:12px;color:var(--bad);min-height:20px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Accès admin</h1>
    <p>Entrez le mot de passe.</p>
    <input id="pw" type="password" placeholder="Mot de passe" autocomplete="current-password" />
    <button id="openBtn" type="button">Ouvrir</button>
    <div id="msg" class="msg"></div>
  </div>
<script>
const P='Morpheus45!';
const K='morph_admin_ok_v3';
function go(){ const v=document.getElementById('pw').value; if(v===P){ try{sessionStorage.setItem(K,'1')}catch(e){} location.href='./admin-panel.html'; } else { document.getElementById('msg').textContent='Mot de passe incorrect.'; } }
try{ if(sessionStorage.getItem(K)==='1'){ location.href='./admin-panel.html'; } }catch(e){}
document.getElementById('openBtn').addEventListener('click', go);
document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') go(); });
</script>
</body>
</html>
