<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Smarters Web</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon-192.png" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <style>
    :root{--bg:#0b1020;--bg2:#111827;--panel:#131a2d;--panel2:#1a2238;--text:#eef2ff;--muted:#a8b2d8;--line:rgba(255,255,255,.09);--accent:#2563eb;--accent2:#7c3aed;--chip:rgba(255,255,255,.06);--shadow:0 10px 28px rgba(0,0,0,.35);--radius:18px}
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(1200px 800px at 10% -10%, rgba(37,99,235,.30), transparent 60%),radial-gradient(1200px 800px at 110% 10%, rgba(124,58,237,.20), transparent 60%),linear-gradient(180deg,var(--bg),var(--bg2));min-height:100vh}
    .app{display:grid;grid-template-columns:88px 1fr;min-height:100vh}
    .sidebar{border-right:1px solid var(--line);background:rgba(9,14,28,.72);backdrop-filter:blur(12px);padding:16px 10px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:12px;align-items:center}
    .logo{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:var(--shadow);font-size:24px;font-weight:800}
    .navBtn{width:58px;height:58px;border-radius:16px;border:1px solid var(--line);background:var(--chip);color:var(--text);cursor:pointer;display:grid;place-items:center;font-size:22px;text-decoration:none}
    .navBtn.active{background:linear-gradient(135deg,var(--accent),var(--accent2))}
    .main{padding:18px 18px 40px}
    .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:16px}
    .titleWrap h1{margin:0;font-size:28px}
    .titleWrap p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .searchWrap{display:flex;gap:10px;flex-wrap:wrap}
    input,select,button{border:1px solid var(--line);border-radius:14px;padding:11px 13px;background:rgba(255,255,255,.05);color:var(--text);outline:none;font-size:14px}
    input{min-width:250px}
    .hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-bottom:16px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
    .heroCard{min-height:180px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;background:linear-gradient(180deg, transparent, rgba(0,0,0,.45)),radial-gradient(900px 300px at 80% 10%, rgba(124,58,237,.35), transparent 50%),radial-gradient(900px 300px at 20% 0%, rgba(37,99,235,.45), transparent 50%)}
    .heroCard h2{margin:0 0 8px}.heroCard p{margin:0;color:#dfe7ff;max-width:700px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat{padding:14px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03)}
    .stat .k{display:block;font-size:24px;font-weight:800}
    .sectionHead{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:14px 0 10px;flex-wrap:wrap}
    .chips,.categories{display:flex;gap:8px;flex-wrap:wrap}
    .chip,.cat{padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:var(--chip);cursor:pointer;font-size:13px}
    .chip.active,.cat.active{background:linear-gradient(135deg,var(--accent),var(--accent2))}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
    .tile{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .16s ease, box-shadow .16s ease}
    .tile:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(0,0,0,.30)}
    .thumb{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:rgba(255,255,255,.04)}
    .meta{padding:10px}
    .name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sub{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .status{font-size:13px;color:var(--muted)}
    .notice{font-size:12px;color:#c8d3ff}
    @media(max-width:980px){.hero{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr 1fr}}
    @media(max-width:720px){.app{grid-template-columns:1fr}.sidebar{position:sticky;top:0;height:auto;flex-direction:row;justify-content:space-between;padding:10px 12px;z-index:100}.main{padding:14px}.searchWrap{width:100%}input{min-width:0;width:100%}.stats{grid-template-columns:1fr}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}.thumb{aspect-ratio:2/3}.name{font-size:12px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">▶</div>
    <button class="navBtn active" data-type="live" title="Live">📺</button>
    <button class="navBtn" data-type="vod" title="VOD">🎬</button>
    <button class="navBtn" data-type="series" title="Séries">📚</button>
    <a class="navBtn" href="./admin.html" title="Admin">⚙</a>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="titleWrap">
        <h1 id="pageTitle">Live</h1>
        <p id="pageSub">Chargement strict par type : aucun mélange entre les sources.</p>
      </div>
      <div class="searchWrap">
        <input id="search" type="text" placeholder="Rechercher..." />
        <select id="sort">
          <option value="cat_title">Catégorie → Titre</option>
          <option value="title">Titre</option>
        </select>
      </div>
    </div>

    <section class="hero">
      <div class="card heroCard">
        <h2 id="heroTitle">Smarters Web</h2>
        <p id="heroText">Chaque onglet lit uniquement ses propres fichiers.</p>
      </div>
      <div class="card">
        <div class="stats">
          <div class="stat"><span class="k" id="statLive">0</span><span>Live</span></div>
          <div class="stat"><span class="k" id="statVod">0</span><span>VOD</span></div>
          <div class="stat"><span class="k" id="statSeries">0</span><span>Séries</span></div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="sectionHead">
        <div class="chips" id="typeChips"></div>
        <div class="status" id="status">Chargement…</div>
      </div>
      <div class="categories" id="categories"></div>
      <div class="notice" id="sourceNotice"></div>
    </section>

    <section class="sectionHead">
      <h2 style="margin:0">Catalogue</h2>
      <div class="status"><span id="count">0</span> éléments</div>
    </section>
    <section class="grid" id="grid"></section>
  </main>
</div>
<script src="./public.js"></script>
</body>
</html>
