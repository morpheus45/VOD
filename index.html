<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>IPTV Premium V2</title>
  <meta name="theme-color" content="#0d3b8e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IPTV Premium V2" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">IPTV Premium V2</div>
      <div class="nav-row">
        <button class="nav-btn active" data-type="live">Live</button>
        <button class="nav-btn" data-type="vod">Films</button>
        <button class="nav-btn" data-type="series">Series</button>
      </div>
    </header>

    <section class="sticky-controls">
      <div class="controls-grid controls-grid--four">
        <select id="categorySelect">
          <option value="">Toutes les sections</option>
        </select>
        <input id="searchInput" type="text" placeholder="Rechercher..." />
        <select id="qualitySelect">
          <option value="">Toutes les qualites</option>
          <option value="4K">4K</option>
          <option value="HD">HD</option>
          <option value="SD">SD</option>
          <option value="Autres">Autres</option>
        </select>
        <select id="sortSelect">
          <option value="title">Titre</option>
          <option value="category">Section</option>
          <option value="recent">Recents</option>
        </select>
      </div>

      <div class="subnav">
        <button class="chip active" id="chipAll">Tous</button>
        <button class="chip" id="chipFavorites">Favoris</button>
        <button class="chip" id="chipContinue">Reprendre</button>
        <button class="chip" id="chipHistory">Historique</button>
      </div>
    </section>

    <main class="content">
      <section class="hero" id="hero">
        <div class="hero-text">
          <h1 id="heroTitle">Chargement...</h1>
          <p id="heroSubtitle">Chargement intelligent JSON / M3U / catalogue decoupe.</p>
          <div class="hero-stats">
            <span id="statType">Live</span>
            <span id="statCount">0 elements</span>
            <span id="statSource">source inconnue</span>
          </div>
        </div>
      </section>

      <section class="section-block" id="continueBlock" hidden>
        <div class="section-title-row">
          <h2>Reprendre la lecture</h2>
        </div>
        <div id="continueGrid" class="grid"></div>
      </section>

      <section class="section-block" id="historyBlock" hidden>
        <div class="section-title-row">
          <h2>Historique</h2>
        </div>
        <div id="historyGrid" class="grid"></div>
      </section>

      <section class="section-block">
        <div class="section-title-row">
          <h2 id="catalogTitle">Catalogue</h2>
          <span id="catalogCount">0 elements</span>
        </div>
        <div id="grid" class="grid"></div>
        <div id="emptyState" class="empty-state" hidden>Aucun element trouve.</div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
