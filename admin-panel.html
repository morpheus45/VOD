<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin</title>
  <link rel="icon" href="./icon-192.png" />
  <style>
    :root{--panel:#121a2b;--panel2:#1a2440;--text:#eef3ff;--muted:#9fb0d0;--accent:#5ea1ff;--border:#2b395f;--ok:#2ecc71}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#0a1020,#10172a);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:16px;display:grid;gap:16px}
    .card{background:rgba(18,26,43,.96);border:1px solid var(--border);border-radius:18px;padding:16px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    textarea,input,button{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--panel2);color:var(--text)}
    textarea{min-height:92px;resize:vertical}
    button{cursor:pointer}
    .btn{width:auto}
    .primary{background:var(--accent);color:#08101f;font-weight:700}
    .good{background:var(--ok);color:#06240f;font-weight:700}
    .muted{color:var(--muted);font-size:13px}
    .status{padding:10px 12px;border:1px solid var(--border);border-radius:12px;min-height:44px}
    code{background:#0d1732;padding:2px 6px;border-radius:6px}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .stat{background:#101a33;border:1px solid var(--border);border-radius:14px;padding:12px}
    .stat strong{display:block;font-size:22px}
    @media(max-width:780px){.stats{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h1 style="margin:0">Admin</h1>
      <button id="logoutBtn" class="btn">Déconnexion</button>
    </div>
    <div class="muted">Extraction brute et enrichie des fichiers live, VOD et séries.</div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Source Xtream</h2>
    <textarea id="apiUrl" placeholder="http://serveur/player_api.php?username=USER&password=PASS"></textarea>
    <div class="row">
      <button id="parseBtn" class="btn">Analyser</button>
      <button id="genLiveBtn" class="btn primary">Générer live.json</button>
      <button id="genVodBtn" class="btn primary">Générer vod.json</button>
      <button id="genSeriesBtn" class="btn primary">Générer series.json</button>
      <button id="genVodCatBtn" class="btn primary">Générer vod_catalog.json</button>
      <button id="genSeriesCatBtn" class="btn primary">Générer series_catalog.json</button>
    </div>
    <div class="muted">La génération directe sur GitHub dépend du CORS autorisé par le serveur Xtream.</div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Imports</h2>
    <div class="row">
      <input type="file" id="liveFile" accept=".json,.m3u,.m3u8" />
      <input type="file" id="vodFile" accept=".json,.m3u,.m3u8" />
      <input type="file" id="seriesFile" accept=".json,.m3u,.m3u8" />
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0">Exports</h2>
    <div class="stats">
      <div class="stat"><div class="muted">Live</div><strong id="liveCount">0</strong></div>
      <div class="stat"><div class="muted">VOD</div><strong id="vodCount">0</strong></div>
      <div class="stat"><div class="muted">Séries</div><strong id="seriesCount">0</strong></div>
    </div>
    <div class="row" style="margin-top:10px">
      <button id="dlLiveM3u" class="btn good">live.m3u</button>
      <button id="dlVodM3u" class="btn good">vod.m3u</button>
      <button id="dlSeriesM3u" class="btn good">series.m3u</button>
      <button id="dlLiveJson" class="btn good">live.json</button>
      <button id="dlVodJson" class="btn good">vod.json</button>
      <button id="dlSeriesJson" class="btn good">series.json</button>
      <button id="dlVodCatalog" class="btn good">vod_catalog.json</button>
      <button id="dlSeriesCatalog" class="btn good">series_catalog.json</button>
    </div>
    <div id="status" class="status">Prêt.</div>
  </div>
</div>
<script src="./admin-panel.js"></script>
</body>
</html>
