<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#1d4ed8" />
  <title>Détail</title>
  <link rel="icon" href="./icon-192.png" />
  <style>
  :root{--bg:#0b1220;--muted:#9fb0d0;--text:#e9eefc;--border:rgba(255,255,255,.10);--shadow:0 10px 30px rgba(0,0,0,.35);--card:rgba(255,255,255,.04);--card2:rgba(255,255,255,.02);}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(1200px 800px at 10% -10%, rgba(29,78,216,.35), transparent 60%),radial-gradient(1200px 800px at 110% 10%, rgba(99,102,241,.25), transparent 60%),#0b1220;color:var(--text)}
  .wrap{max-width:1180px;margin:0 auto;padding:16px}
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
  .btn{padding:10px 12px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
  .btn-primary{background:linear-gradient(135deg, rgba(29,78,216,.95), rgba(99,102,241,.85));border-color:rgba(255,255,255,.14)}
  .layout{display:grid;grid-template-columns:280px 1fr;gap:16px}
  .card{background:linear-gradient(180deg, var(--card), var(--card2));border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:var(--shadow)}
  .poster{width:100%;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.04)}
  .poster img{width:100%;display:block;aspect-ratio:2/3;object-fit:cover}
  h1,h2,h3{margin:0 0 10px}
  .muted,.status,.meta,.plot{color:var(--muted)}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
  .seasonTabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
  .tab{padding:8px 10px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);cursor:pointer;font-size:13px;width:auto;color:var(--text)}
  .tab.active{background:linear-gradient(135deg, rgba(29,78,216,.95), rgba(99,102,241,.85));border-color:rgba(255,255,255,.14)}
  .epGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  .epCard{border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:16px;overflow:hidden}
  .epPoster{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:rgba(255,255,255,.04)}
  .epBody{padding:10px}
  .epMeta{font-size:12px;color:var(--muted);margin-top:6px}
  code{background:#0d1732;padding:2px 6px;border-radius:6px}
  @media(max-width:860px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="./index.html" class="btn">← Retour</a>
    <div id="topType" class="muted"></div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="poster"><img id="poster" alt=""></div>
    </div>

    <div class="card">
      <h1 id="title">Chargement…</h1>
      <div id="meta" class="meta"></div>
      <p id="plot" class="plot"></p>
      <div id="notice" class="status"></div>
      <div id="vodActions" class="actions" style="display:none">
        <a id="playBtn" class="btn btn-primary" href="#">Lire</a>
        <button id="copyBtn" class="btn" type="button">Copier le lien</button>
      </div>

      <div id="seriesWrap" style="display:none">
        <h2 style="margin-top:18px">Saisons</h2>
        <div id="seasonTabs" class="seasonTabs"></div>
        <div id="episodeGrid" class="epGrid"></div>
        <div id="seriesStatus" class="status"></div>
      </div>
    </div>
  </div>
</div>
<script src="details.js"></script>
</body>
</html>
